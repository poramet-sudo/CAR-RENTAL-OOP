{% extends "base.html" %}

{% block title %}หน้าหลัก - UBU RentCar{% endblock %}

{% block extra_css %}
<style>
    /* ตกแต่งส่วนแบนเนอร์รูปภาพ (ไล่ระดับสีฟ้าไปเขียว) */
    .hero-section {
        background: linear-gradient(135deg, #0072ff 0%, #00c6ff 50%, #20c997 100%);
        padding: 120px 0 150px;
        color: white;
        text-align: center;
    }
    
    /* ตกแต่งกล่องค้นหาให้ลอยขึ้นมาทับแบนเนอร์ */
    .search-card {
        margin-top: -80px; 
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        padding: 30px;
        background-color: white;
    }
</style>
{% endblock %}

{% block content %}
    <div class="hero-section">
        <div class="container">
            <h1 class="display-4 fw-bold">จองรถเช่า เที่ยวอุบลราชธานี</h1>
            <p class="lead">เลือกรถที่ใช่ ในราคาที่ชอบ พร้อมให้บริการ 24 ชั่วโมง</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="search-card">
            <h4 class="text-theme-blue text-center mb-4 fw-bold">จองตรง ถูกสุด</h4>
            
            <form action="/search" method="GET">
                <div class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label class="form-label text-muted small">สถานที่รับและคืนรถ</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-geo-alt text-theme-blue"></i></span>
                            <select class="form-select border-start-0" name="location">
                                <option value="airport">สนามบินอุบลราชธานี</option>
                                <option value="ubu">มหาวิทยาลัยอุบลราชธานี</option>
                                <option value="bus_station">สถานีขนส่งผู้โดยสารอุบลราชธานี</option>
                            </select>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label text-muted small">วันและเวลารับรถ</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-calendar-event text-theme-blue"></i></span>
                            <input type="date" class="form-control border-start-0" name="pickup_date">
                        </div>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label text-muted small">วันและเวลาคืนรถ</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-calendar-check text-theme-blue"></i></span>
                            <input type="date" class="form-control border-start-0" name="return_date">
                        </div>
                    </div>

                    <div class="col-md-1 d-grid">
                        <button type="submit" class="btn btn-custom-green h-100">ค้นหา</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
